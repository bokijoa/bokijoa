<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파인을 위한 실사출력 견적 마스터 (FINE Communications)</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 Production UMD CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts: Inter 주입 (글로벌 표준 가독성 서체) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- LaTeX 수학 수식 렌더링을 위한 MathJax CDN -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- 글로벌 서체 및 인쇄(Print) 특화 최적화 CSS 수립 -->
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    /* 브라우저 실물 인쇄 전용 CSS 정의 - 부모 상속 차단 및 다이렉트 A4 피팅 */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
      }
      /* 인쇄 시 화면 내의 견적 프로그램 GNB 및 설계기는 전면 무시 처리 */
      #root-calculator, header, footer, button, .no-print {
        display: none !important;
      }
      /* 인쇄 대상 전체를 덮고 있는 바깥 오버레이 레이어의 불필요한 배경/그림자 투명화 */
      .print-modal-overlay {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        height: auto !important;
        background: transparent !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        padding: 0 !important;
        margin: 0 !important;
        overflow: visible !important;
        display: block !important;
      }
      /* 인쇄 시 조작 세팅용 패널바 상하단을 완벽하게 숨김 */
      .print-modal-overlay > div > div:first-child, 
      .print-modal-overlay > div > div:nth-child(2),
      .print-modal-overlay > div > div:last-child {
        display: none !important;
      }
      /* 중간 컨테이너의 제한된 맥스 가로 세로 스케일 무력화 */
      .print-modal-overlay > div {
        background: transparent !important;
        max-height: none !important;
        overflow: visible !important;
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
        max-width: none !important;
        box-shadow: none !important;
        border: none !important;
      }
      /* 인쇄 대상 견적 영수증 영역만 무조건 100% 비율로 단독 노출 */
      #printable-estimate-sheet {
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        border: none !important;
        box-shadow: none !important;
        padding: 40px !important; /* p-10과 일치 */
        margin: 0 !important;
        page-break-inside: avoid;
        box-sizing: border-box !important;
      }
      /* 수기 직접 기입 인풋 영역 플레이스홀더 및 인풋 윤곽선 무음화 */
      input::placeholder {
        color: transparent !important;
      }
      input {
        border: none !important;
        box-shadow: none !important;
        background: transparent !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-violet-100">

  <!-- React 마운트 지점 -->
  <div id="root"></div>

  <!-- React & App 스크립트 작성 -->
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // 원단 및 부속 자재 초기 단가 정보 정의 (천소재 / 접착용소재 / 비접착소재)
    const INITIAL_PRICES = {
      '천소재': {
        '일반 현수막': 7000,
        '연결 현수막': 10000,
        '텐트 천': 7000,
        '블라인드 천': 7000,
        '부직포': 8000,
        '솔벤 현수막': 10000
      },
      '접착용소재': {
        '켈지': 35000,
        '유포지': 35000,
        '투명 시트지': 35000,
        '래핑지': 35000,
        'UV 시트지': 35000,
        '시트지': 35000
      },
      '비접착소재': {
        '3T': 30000,
        '5T': 40000,
        '8T': 55000,
        '10T': 70000
      },
      processing: {
        '각목과 줄': 2000,
        '일반 타공': 500,
        '텐트 타공': 1000,
        '봉미싱': 2000,
        '사방 밴드미싱': 5000
      },
      additional: {
        'S자고리': 500,
        '뽁뽁이': 500
      }
    };

    function App() {
      const [prices, setPrices] = useState(INITIAL_PRICES);
      const [cart, setCart] = useState([]);
      
      // 입력 폼 상태 (기본 밀리미터 단위 초기값 1000mm)
      const [category, setCategory] = useState('천소재'); 
      const [material, setMaterial] = useState('일반 현수막');
      const [width, setWidth] = useState('1000'); // mm 단위
      const [height, setHeight] = useState('1000'); // mm 단위
      const [quantity, setQuantity] = useState(1);
      
      // 디자인 비용 상태군
      const [designType, setDesignType] = useState('파일'); // 파일 | 간단 | 기본 | 고급 | 디자인비
      const [customDesignPrice, setCustomDesignPrice] = useState(''); // 직접 입력한 디자인 가격

      // 후가공 선택 상태 분류 (일반 선택형 vs 수량형 타공)
      const [selectedProcessing, setSelectedProcessing] = useState([]); 
      const [tagongQtys, setTagongQtys] = useState({
        '일반 타공': 0,
        '텐트 타공': 0
      });

      // 추가 소모품 수량 (총 주문 수량 연산과 완전히 독립됨)
      const [selectedAdditional, setSelectedAdditional] = useState({
        'S자고리': 0,
        '뽁뽁이': 0
      });

      // 공식 견적서 정보 입력용 상태 변수군
      const [showQuotation, setShowQuotation] = useState(false);
      const [estimateCustomer, setEstimateCustomer] = useState(''); // 공급받는 자
      const [estimateTitle, setEstimateCustomerTitle] = useState(''); // 건명
      const [estimateValidity, setEstimateValidity] = useState('제출일로부터 15일간'); // 견적유효기간
      const [showSeal, setShowSeal] = useState(true); // 공식 직인 표출 여부
      const [estimateManager, setEstimateManager] = useState(''); // 담당자 정보 추가
      
      // 발행일자 거래처별 임의 편집을 위한 전용 Date 상태 선언 (초기값 당일)
      const [estimateDate, setEstimateDate] = useState(() => {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      });

      // 견적서 내 미입력 빈 행에 수기로 즉각 타이핑할 수 있게 하는 5슬롯 동적 상태 수립
      const [manualInputs, setManualInputs] = useState(
        Array.from({ length: 5 }, () => ({ spec: '', qty: '', price: '' }))
      );

      // 관리자 시스템 상태 및 신규 단가 추가용 로컬 버퍼 상태군
      const [showAdmin, setShowAdmin] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
      const [editablePrices, setEditablePrices] = useState(INITIAL_PRICES);

      // 단가 관리 내 신규 동적 제품/가공명 추가용 입력 필드 버퍼
      const [newInputName, setNewItemName] = useState({
        '천소재': '',
        '접착용소재': '',
        '비접착소재': '',
        'processing': '',
        'additional': ''
      });
      const [newInputPrice, setNewItemPrice] = useState({
        '천소재': '',
        '접착용소재': '',
        '비접착소재': '',
        'processing': '',
        'additional': ''
      });

      // 모달 알림창 상태
      const [alertModal, setAlertModal] = useState({
        isOpen: false,
        title: '',
        message: '',
        type: 'success'
      });

      useEffect(() => {
        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise();
        }
      }, [category, material, width, height, cart, alertModal.isOpen, designType, showQuotation, manualInputs]);

      const handleCategoryChange = (newCat) => {
        setCategory(newCat);
        const materials = Object.keys(prices[newCat]);
        setMaterial(materials[0]);
      };

      const showAlert = (title, message, type = 'success') => {
        setAlertModal({ isOpen: true, title, message, type });
      };

      const handleProcessingToggle = (name) => {
        if (selectedProcessing.includes(name)) {
          setSelectedProcessing(selectedProcessing.filter(item => item !== name));
        } else {
          setSelectedProcessing([...selectedProcessing, name]);
        }
      };

      const handleTagongQtyChange = (name, val) => {
        const parsed = parseInt(val) || 0;
        setTagongQtys({
          ...tagongQtys,
          [name]: Math.max(0, parsed)
        });
      };

      const handleAdditionalQtyChange = (name, val) => {
        const parsed = parseInt(val) || 0;
        setSelectedAdditional({
          ...selectedAdditional,
          [name]: Math.max(0, parsed)
        });
      };

      // 디자인 금액 연산
      const designCost = useMemo(() => {
        switch (designType) {
          case '파일':
            return 0;
          case '간단':
            return 5000;
          case '기본':
            return 10000;
          case '고급':
            return 30000;
          case '디자인비':
            return parseInt(customDesignPrice, 10) || 0;
          default:
            return 0;
        }
      }, [designType, customDesignPrice]);

      const currentCalculation = useMemo(() => {
        const wNum = parseFloat(width) || 0;
        const hNum = parseFloat(height) || 0;
        
        const area = (wNum / 1000) * (hNum / 1000); 
        const unitPrice = prices[category][material] || 0;
        
        let materialCost = area * unitPrice;

        // 접착용소재 0.3 회배 이하 최소 금액 3,500원 적용 보증
        let isAdhesiveMinimumApplied = false;
        if (category === '접착용소재') {
          if (area <= 0.3 && area > 0) {
            materialCost = 3500;
            isAdhesiveMinimumApplied = true;
          }
        }

        materialCost = Math.round(materialCost);

        // 일반 후가공 합산
        const binaryCost = selectedProcessing.reduce((sum, name) => {
          return sum + (prices.processing[name] || 0);
        }, 0);

        // 수량제 타공 비용 합산
        const tagongCost = Object.entries(tagongQtys).reduce((sum, [name, qty]) => {
          return sum + ((prices.processing[name] || 0) * qty);
        }, 0);

        const processingCost = binaryCost + tagongCost;

        // 추가 구성품 비용 합계 (독립 연산 대상)
        const additionalCost = Object.entries(selectedAdditional).reduce((sum, [name, qty]) => {
          return sum + ((prices.additional[name] || 0) * qty);
        }, 0);

        // (소재 원가 + 후가공비)는 주문수량과 곱셈 처리
        const printSubtotal = materialCost + processingCost;
        
        // 추가구성품 및 디자인비용은 총 주문 수량(quantity)에 곱하지 않고 종합합계에서 순수 단독 덧셈 처리
        const total = (printSubtotal * quantity) + additionalCost + designCost;

        return {
          area: area.toFixed(3),
          materialCost,
          processingCost,
          additionalCost, 
          designCost, 
          unitTotal: printSubtotal, 
          total, 
          isAdhesiveMinimumApplied
        };
      }, [category, material, width, height, quantity, selectedProcessing, tagongQtys, selectedAdditional, prices, designCost]);

      const handleAddToCart = () => {
        const wNum = parseFloat(width) || 0;
        const hNum = parseFloat(height) || 0;

        if (wNum <= 0 || hNum <= 0 || quantity <= 0) {
          showAlert('입력값 오류', '가로 길이, 세로 길이 및 수량은 0보다 커야 합니다.', 'error');
          return;
        }

        const currentProcessingList = [];
        selectedProcessing.forEach(name => {
          currentProcessingList.push({ name, price: prices.processing[name], qty: 1 });
        });
        Object.entries(tagongQtys).forEach(([name, qty]) => {
          if (qty > 0) {
            currentProcessingList.push({ name, price: prices.processing[name], qty });
          }
        });

        const newItem = {
          id: Date.now() + Math.random().toString(36).substr(2, 9),
          category,
          categoryLabel: category === '천소재' ? '천소재' : category === '접착용소재' ? '접착용소재' : '비접착소재',
          material,
          width: wNum,
          height: hNum,
          area: currentCalculation.area,
          quantity,
          materialCost: currentCalculation.materialCost,
          processing: currentProcessingList,
          designType,
          designCost: currentCalculation.designCost, 
          additional: Object.entries(selectedAdditional)
            .filter(([_, qty]) => qty > 0)
            .map(([name, qty]) => ({ name, qty, price: prices.additional[name] })),
          additionalTotalCost: currentCalculation.additionalCost, 
          isAdhesiveMinimumApplied: currentCalculation.isAdhesiveMinimumApplied,
          unitTotal: currentCalculation.unitTotal, 
          total: currentCalculation.total
        };

        setCart([...cart, newItem]);
        showAlert('추가 완료', `"${material}" 항목을 장바구니에 정상 수납하였습니다.`, 'success');
        
        // 입력 폼 초기화 (치수 규격은 편의상 유지, 디자인비 및 부재료 초기화)
        setSelectedProcessing([]);
        setTagongQtys({ '일반 타공': 0, '텐트 타공': 0 });
        setSelectedAdditional({ 'S자고리': 0, '뽁뽁이': 0 });
        setDesignType('파일');
        setCustomDesignPrice('');
        setQuantity(1);
      };

      const updateCartItemQty = (id, newQty) => {
        const qty = Math.max(1, parseInt(newQty) || 1);
        setCart(cart.map(item => {
          if (item.id === id) {
            return {
              ...item,
              quantity: qty,
              // 수량 변동 시에도 추가구성품 및 디자인비용은 수량 곱셈 대상에서 완전히 배제
              total: (item.unitTotal * qty) + item.additionalTotalCost + item.designCost
            };
          }
          return item;
        }));
      };

      const deleteCartItem = (id) => {
        setCart(cart.filter(item => item.id !== id));
      };

      // 장바구니에 담긴 내역의 공급가액 총계
      const totalCartPrice = useMemo(() => {
        return cart.reduce((sum, item) => sum + item.total, 0);
      }, [cart]);

      // 사용자가 견적서 내에 직접 수기 기입한 슬롯들의 공급가액을 계산하여 반영하는 로직
      const quoteSubtotal = useMemo(() => {
        let sum = totalCartPrice;
        // 5개 슬롯 중 cart 내역을 제외한 나머지 빈 슬롯의 수기 입력값을 동적 합산
        for (let i = cart.length; i < 5; i++) {
          const input = manualInputs[i];
          if (input) {
            const q = parseInt(input.qty) || 0;
            const p = parseInt(input.price) || 0;
            sum += q * p;
          }
        }
        return sum;
      }, [totalCartPrice, cart.length, manualInputs]);

      // 실시간 수기 통합 VAT(10%) 계산
      const quoteVat = useMemo(() => {
        return Math.round(quoteSubtotal * 0.1);
      }, [quoteSubtotal]);

      // 1. 최종 합계 금액 100원 단위 미만 절사 연산 적용
      const quoteTotal = useMemo(() => {
        const exactTotal = quoteSubtotal + quoteVat;
        return Math.floor(exactTotal / 100) * 100;
      }, [quoteSubtotal, quoteVat]);

      // 실시간 카트 요약 패널 내 100원 단위 미만 절사 합계 적용
      const totalVat = useMemo(() => {
        return Math.round(totalCartPrice * 0.1);
      }, [totalCartPrice]);

      const totalCartPriceWithVat = useMemo(() => {
        const exactTotal = totalCartPrice + totalVat;
        return Math.floor(exactTotal / 100) * 100;
      }, [totalCartPrice, totalVat]);

      const handleAdminLogin = () => {
        if (adminPassword === 'pine1234') {
          setIsAdminAuthenticated(true);
          setEditablePrices(JSON.parse(JSON.stringify(prices)));
          showAlert('인증 통과', '마스터 보안 계정 승인이 완료되었습니다. 이제 자유롭게 실시간 단가 및 신규 항목을 원장 조작할 수 있습니다.', 'success');
        } else {
          showAlert('인증 실패', '관리자 마스터 비밀번호가 불일치합니다.', 'error');
        }
      };

      const handlePriceFieldChange = (cat, key, val) => {
        const numVal = Math.max(0, parseInt(val) || 0);
        setEditablePrices({
          ...editablePrices,
          [cat]: {
            ...editablePrices[cat],
            [key]: numVal
          }
        });
      };

      // 2. 단가 관리 시스템 내 동적 항목 추가(CRUD) 핸들러 수립
      const handleAddNewItem = (categoryKey) => {
        const name = newInputName[categoryKey]?.trim();
        const priceVal = parseInt(newInputPrice[categoryKey], 10) || 0;

        if (!name) {
          showAlert('추가 실패', '추가할 제품/가공 명칭을 성실히 적어 주십시오.', 'error');
          return;
        }

        if (editablePrices[categoryKey][name] !== undefined) {
          showAlert('중복 경고', '이미 원장 내에 동일한 명칭의 항목이 존재합니다.', 'error');
          return;
        }

        // 임시 원장 상태에 즉각 덧셈 등록
        setEditablePrices({
          ...editablePrices,
          [categoryKey]: {
            ...editablePrices[categoryKey],
            [name]: priceVal
          }
        });

        // 입력창 비우기
        setNewItemName({ ...newInputName, [categoryKey]: '' });
        setNewItemPrice({ ...newInputPrice, [categoryKey]: '' });
        showAlert('항목 임시 추가', `"${name}" 항목이 목록 아래에 준비되었습니다. '수정 단가 저장 및 즉각 반영' 버튼을 누르시면 최종 동기화됩니다.`, 'info');
      };

      // 단가 관리 내 특정 자재 영구 소거
      const handleRemoveItem = (categoryKey, itemKey) => {
        const categoryData = { ...editablePrices[categoryKey] };
        delete categoryData[itemKey];

        setEditablePrices({
          ...editablePrices,
          [categoryKey]: categoryData
        });
      };

      const handleSavePrices = () => {
        if (!isAdminAuthenticated) {
          showAlert('인증 누락', '단가 설정을 변경하기 전 마스터 보안 인증을 먼저 통과해 주십시오.', 'error');
          return;
        }
        setPrices(editablePrices);

${textSummary}

* 본 가격은 FINE Communications 표준 단가표 기준입니다.`;

          )}

          {/* 알림 모달창 */}
          {alertModal.isOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-55 p-4 no-print animate-in fade-in duration-100">
              <div className="bg-white rounded-xl shadow-2xl max-w-sm w-full p-5 border border-slate-200 transform transition-transform scale-100">
                <div className="flex items-center gap-3 mb-3">
                  <h4 className="font-black text-slate-900 text-sm">{alertModal.title}</h4>
                </div>
                <p className="text-xs text-slate-600 leading-relaxed whitespace-pre-line font-medium">{alertModal.message}</p>
                <div className="mt-5 flex justify-end">
                  <button
                    type="button"
                    onClick={() => setAlertModal({ ...alertModal, isOpen: false })}
                    className="px-4 py-1.5 bg-neutral-900 text-white text-xs font-bold rounded-lg hover:bg-neutral-800"
                  >
                    확인
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-slate-100 border-t border-slate-200 py-6 text-center text-xs text-slate-400 font-bold no-print">
            <p>© 2026 FINE Communications. All rights reserved.</p>
          </footer>

        </div>
      );
    }

    // React 18 루트 초기화 및 마운트
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
